<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ง้อนะครับคนดี - Neon Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-blue: #00f2ff;
        }
        body {
            font-family: 'Anuphan', sans-serif;
            background: #0a0a0c;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* ดาวระยิบระยับพื้นหลัง */
        #stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .neon-card {
            background: rgba(20, 20, 25, 0.8);
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.2), inset 0 0 15px rgba(255, 0, 85, 0.1);
            border-radius: 2rem;
            position: relative;
        }

        .neon-text {
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            font-family: 'Anuphan', sans-serif;
            font-weight: 600;
        }

        .btn-neon {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            transition: all 0.3s;
        }

        .btn-neon:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .btn-forgive {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
            animation: pulse-neon 2s infinite;
        }

        @keyframes pulse-neon {
            0% { box-shadow: 0 0 10px var(--neon-pink); }
            50% { box-shadow: 0 0 30px var(--neon-pink); }
            100% { box-shadow: 0 0 10px var(--neon-pink); }
        }

        @keyframes loading-bar {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>

    <div class="neon-card p-10 md:p-14 max-w-md w-full mx-5 text-center transition-all duration-500" id="mainCard">
        
        <div id="content">
            <div class="mb-6">
                <span class="text-[var(--neon-blue)] text-xs tracking-[0.3em] uppercase border border-[var(--neon-blue)] px-3 py-1 rounded-md">
                    System Message: Apology
                </span>
            </div>
            
            <h1 class="text-4xl md:text-5xl mb-6 neon-text">ดีกันนะ...</h1>
            
            <div class="space-y-4 mb-10 text-gray-400 font-light">
                <p class="text-lg text-gray-200">แมนขอโทษจริงๆ ครับ</p>
                <p class="text-sm">แมนรู้ตัวนะว่าแมนมันกวนประสาท <br>แมนขอโทษค้าบบบ แมนจะทำอีกเรื่อยๆ😋</p>
            </div>

            <div class="flex flex-col gap-6 relative">
                <button onclick="forgiven()" 
                    class="btn-forgive w-full py-4 rounded-xl font-bold text-xl transition-all active:scale-95">
                    หายงอนแล้ว 💖
                </button>
                
                <div class="h-10 relative">
                    <button id="noBtn" onmouseover="runAway()" 
                        class="absolute left-0 right-0 mx-auto w-40 py-2 text-gray-500 text-xs border border-gray-800 rounded-lg hover:text-[var(--neon-pink)] transition-all">
                        ยังงอนอยู่!
                    </button>
                </div>
            </div>
        </div>

        <div id="success" class="hidden flex flex-col items-center py-5">
            <div class="text-7xl mb-6">🛸</div>
            <h2 class="text-3xl font-bold text-white mb-2 neon-text" style="text-shadow: 0 0 15px var(--neon-blue);">MISSION SUCCESS</h2>
            <p class="text-gray-400 mb-8 font-light">คืนค่าความสัมพันธ์ 100% <br>ไอ้กากเอ้ยยยย!</p>
            
            <div class="w-full h-1 bg-gray-800 rounded-full overflow-hidden">
                <div class="h-full bg-[var(--neon-blue)] shadow-[0_0_10px_var(--neon-blue)] animate-[loading-bar_2s_ease-in-out_forwards]"></div>
            </div>
        </div>
    </div>

    <script>
        // Star Background Effect
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5
                });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animateStars);
        }
        initStars(); animateStars();

        // Run Away Button
        let count = 0;
        function runAway() {
            const btn = document.getElementById('noBtn');
            const x = (Math.random() - 0.5) * 250;
            const y = (Math.random() - 0.5) * 150 - 60;
            btn.style.transform = `translate(${x}px, ${y}px)`;
            btn.style.borderColor = 'var(--neon-pink)';
            btn.innerText = ["ไม่ให้กด!", "ใจอ่อนเหอะ", "แบร่ 😜", "ไปนู่นแล้ว", "จับให้ได้สิ"][count % 5];
            count++;
        }

        // Success State
        function forgiven() {
            document.getElementById('content').classList.add('hidden');
            const success = document.getElementById('success');
            success.classList.remove('hidden');
            
            const card = document.getElementById('mainCard');
            card.style.borderColor = 'var(--neon-blue)';
            card.style.boxShadow = '0 0 30px rgba(0, 242, 255, 0.4)';

            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff0055', '#00f2ff', '#ffffff']
            });
        }
    </script>
</body>
</html>
