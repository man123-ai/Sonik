<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ง้อนะครับคนดี - Interactive Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            cursor: none; /* ใช้ Cursor จำลองแทน */
        }

        #custom-cursor {
            width: 20px;
            height: 20px;
            background: rgba(255, 77, 109, 0.3);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .title-reveal {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            color: #1a1a1a;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .btn-container {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #yesBtn {
            background: #ff4d6d;
            color: white;
            padding: 1.5rem 3rem;
            border-radius: 5rem;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.3);
        }

        #noBtn {
            color: #9ca3af;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            padding: 10px;
        }

        .floating-emoji {
            position: absolute;
            pointer-events: none;
            font-size: 1.5rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <div class="main-container" id="mainScene">
        <div id="content">
            <div class="title-reveal">
                <span id="text-main">ขอโทษนะ</span>
            </div>
            <p class="text-gray-400 text-lg max-w-xs mx-auto" id="text-sub">
                แมนรู้ตัวว่าทำตัวไม่น่ารัก... <br>ขอโอกาสแก้ตัวอีกครั้งได้ไหมครับ?
            </p>

            <div class="btn-container">
                <button id="yesBtn" onclick="celebrate()">
                    หายงอนแล้ว ✨
                </button>
                <button id="noBtn" onmouseover="dodge()">
                    ยังงอนอยู่มากก!
                </button>
            </div>
        </div>

        <div id="success" class="hidden">
            <h1 class="text-6xl font-bold text-[#ff4d6d] mb-4">เย้! ❤️</h1>
            <p class="text-gray-500">สัญญาว่าจะดูแลให้ดีกว่าเดิม 1,000 เท่า!</p>
        </div>
    </div>

    <script>
        // Cursor ตามเมาส์
        const cursor = document.getElementById('custom-cursor');
        window.addEventListener('mousemove', (e) => {
            gsap.to(cursor, {
                x: e.clientX - 10,
                y: e.clientY - 10,
                duration: 0.5,
                ease: "power3.out"
            });
        });

        // ลูกเล่นปุ่มหนี + ปุ่ม YES ขยายใหญ่
        let scale = 1;
        function dodge() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            
            // สุ่มตำแหน่งปุ่ม NO
            const x = (Math.random() - 0.5) * 300;
            const y = (Math.random() - 0.5) * 300;
            gsap.to(noBtn, { x: x, y: y, duration: 0.3 });

            // ขยายปุ่ม YES บีบคั้นใจ
            scale += 0.15;
            gsap.to(yesBtn, { scale: scale, duration: 0.3 });
            
            // เปลี่ยนข้อความสุ่ม
            const texts = ["กดปุ่มแดงเถอะ", "แว่บ!", "หนีล่ะนะ", "ใจร้ายจัง", "ทางนี้ๆ"];
            noBtn.innerText = texts[Math.floor(Math.random() * texts.length)];
        }

        // เอฟเฟกต์เฉลิมฉลอง
        function celebrate() {
            const content = document.getElementById('content');
            const success = document.getElementById('success');
            
            gsap.to(content, { opacity: 0, y: -50, duration: 0.5, onComplete: () => {
                content.classList.add('hidden');
                success.classList.remove('hidden');
                gsap.from(success, { opacity: 0, scale: 0.5, duration: 0.8, ease: "back.out(1.7)" });
            }});

            // ยิงพลุแบบกระจายทั่วจอ
            const end = Date.now() + 3000;
            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff4d6d', '#ff8fa3']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff4d6d', '#ff8fa3']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // สร้าง Emoji ลอยๆ พื้นหลัง
        function spawnEmoji() {
            const emojis = ['❤️', '✨', '☁️', '🌸'];
            const emoji = document.createElement('div');
            emoji.className = 'floating-emoji';
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.top = '110vh';
            document.body.appendChild(emoji);

            gsap.to(emoji, {
                y: '-120vh',
                x: (Math.random() - 0.5) * 200,
                rotation: Math.random() * 360,
                duration: 5 + Math.random() * 5,
                ease: "none",
                onComplete: () => emoji.remove()
            });
        }
        setInterval(spawnEmoji, 1000);
    </script>
</body>
</html>
