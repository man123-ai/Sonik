<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ง้อนะครับคนดี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background: #fff0f3;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #fff0f3;
            background-image: 
                radial-gradient(at 20% 20%, hsla(343,100%,92%,0.7) 0, transparent 50%), 
                radial-gradient(at 80% 20%, hsla(204,100%,93%,0.7) 0, transparent 50%),
                radial-gradient(at 80% 80%, hsla(343,100%,92%,0.7) 0, transparent 50%),
                radial-gradient(at 20% 80%, hsla(204,100%,93%,0.7) 0, transparent 50%);
            filter: blur(60px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.5s ease;
        }

        .shimmer {
            background: linear-gradient(90deg, #ff4d6d, #ff8fa3, #ff4d6d);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .bg-heart {
            position: absolute;
            font-size: 24px;
            color: rgba(255, 143, 163, 0.3);
            animation: floatUp 8s linear infinite;
            z-index: -1;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .pulse-btn {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 77, 109, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div id="bg-hearts-container"></div>

    <div class="glass-card p-10 md:p-14 max-w-md w-full mx-5 text-center relative transition-all duration-500" id="mainCard">
        
        <div id="content" class="transition-all duration-500 ease-in-out">
            <span class="inline-block px-4 py-1.5 rounded-full bg-rose-100 text-rose-500 text-xs font-bold mb-6 tracking-widest uppercase shadow-sm">
                I'm So Sorry 🥺
            </span>
            
            <h1 class="text-4xl md:text-5xl font-bold mb-4 shimmer">เรามาง้ออะ</h1>
            
            <div class="space-y-3 mb-10 text-gray-600 font-light leading-relaxed">
                <p class="text-xl font-medium text-gray-700">ดีกันนะคับคนเก่ง...</p>
                <p class="text-sm md:text-base">แมนอาจจะทำอะไรให้เธอไม่พอใจไปบ้าง <br> แต่แมนไม่ได้ตั้งใจจริงๆ นะ ให้อภัยแมนเถอะ</p>
            </div>

            <div class="flex flex-col gap-4 relative">
                <button onclick="forgiven()" 
                    class="pulse-btn group relative w-full py-4 bg-gradient-to-r from-rose-400 to-pink-500 text-white rounded-2xl font-semibold text-lg overflow-hidden transition-all hover:scale-[1.02] active:scale-95 shadow-lg">
                    <span class="relative z-10">หายงอนแล้ว (ยกโทษให้) 💖</span>
                </button>
                
                <div class="h-12 relative w-full"> 
                    <button id="noBtn" onmouseover="runAway()" 
                        class="absolute left-0 right-0 mx-auto w-48 py-3 bg-white text-gray-400 text-sm rounded-xl border border-gray-200 hover:text-rose-400 hover:border-rose-200 hover:bg-rose-50 transition-all shadow-sm z-20">
                        ยังงอนอยู่มากกก! 😤
                    </button>
                </div>
            </div>
        </div>

        <div id="success" class="hidden flex flex-col items-center p-10 w-full relative">
            <div class="text-7xl mb-6 animate-bounce">🧸</div>
            <h2 class="text-3xl font-bold text-gray-800 mb-3 shimmer">เย้! กูดีใจโว้ยยยยยย</h2>
            <p class="text-gray-600 mb-8 font-light text-center">ขอบคุณที่ให้อภัยนะ <br>เดี๋ยววันนี้แมนดูแลอย่างดีเลย! 🥰</p>
            
            <div class="w-full h-2 bg-rose-100 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-rose-400 to-pink-500 rounded-full animate-[loading_2s_ease-in-out_forwards]"></div>
            </div>
            <p class="text-xs text-rose-400 mt-4 animate-pulse">กำลังโหลดความดีใจของแมน 100%...</p>
        </div>
    </div>

    <script>
        function createBgHearts() {
            const container = document.getElementById('bg-hearts-container');
            const hearts = ['🤍', '🌸', '✨', '🫧'];
            for(let i=0; i<15; i++) {
                let heart = document.createElement('div');
                heart.className = 'bg-heart';
                heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = `${Math.random() * 100}vw`;
                heart.style.animationDelay = `${Math.random() * 8}s`;
                heart.style.animationDuration = `${5 + Math.random() * 5}s`;
                heart.style.fontSize = `${15 + Math.random() * 20}px`;
                container.appendChild(heart);
            }
        }
        createBgHearts();

        let noClickCount = 0;
        const noTexts = [
            "กดยากหน่อยนะ 😜", 
            "แน่ใจหรอออ?", 
            "หนีดีกว่าาา 💨", 
            "แบร่ๆๆ 😛", 
            "ยอมใจอ่อนเถอะน่าา", 
            "จับไม่ทันหรอก 😝",
            "รักแมนเถอะนะ 🥺"
        ];

        function runAway() {
            const btn = document.getElementById('noBtn');
            const x = (Math.random() - 0.5) * 200; 
            const y = (Math.random() - 0.5) * 150 - 50; 
            btn.style.transform = `translate(${x}px, ${y}px)`;
            btn.innerText = noTexts[noClickCount % noTexts.length];
            noClickCount++;
        }

        // ฟังก์ชันเมื่อกดยกโทษ - ปรับปรุง JS เพื่อลด delay ของ container ขยาย
        function forgiven() {
            const content = document.getElementById('content');
            const success = document.getElementById('success');
            const card = document.getElementById('mainCard');
            
            // ซ่อนหน้าเก่า โชว์หน้าใหม่
            content.style.opacity = '0';
            content.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                content.classList.add('hidden');
                success.classList.remove('hidden'); // แสดงทันทีเพื่อให้ container ขยาย
                
                // ให้เวลา DOM render แป๊บนึงเพื่อให้ container แม่ขยายตามขนาดใหม่
                setTimeout(() => {
                    card.style.borderColor = 'rgba(255, 143, 163, 0.5)';
                    card.style.boxShadow = '0 0 40px rgba(255, 143, 163, 0.3)';
                }, 50);

                // ยิง Confetti รัวๆ 3 วินาที
                fireConfetti();
            }, 300);
        }

        function fireConfetti() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#ff4d6d', '#ffb3c6', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#ff4d6d', '#ffb3c6', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>

    <style>
        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</body>
</html>
