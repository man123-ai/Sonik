<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Man vs Anger Boss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Anuphan:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Anuphan', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .retro-font { font-family: 'Press Start 2P', cursive; }

        .game-container {
            border: 4px solid #fff;
            padding: 2rem;
            background: #000;
            box-shadow: 10px 10px 0px #ff4d6d;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        .hp-bar-bg {
            width: 100%;
            height: 20px;
            background: #444;
            border: 2px solid #fff;
            margin-bottom: 10px;
        }

        #hp-fill {
            width: 100%;
            height: 100%;
            background: #ff0000;
            transition: width 0.3s ease;
        }

        .btn-retro {
            border: 4px solid #fff;
            padding: 10px 20px;
            background: #000;
            transition: all 0.1s;
            cursor: pointer;
            position: relative;
        }

        .btn-retro:active {
            transform: translate(4px, 4px);
            box-shadow: none;
        }

        .btn-yes {
            box-shadow: 6px 6px 0px #00ff00;
            color: #00ff00;
        }

        .btn-no {
            box-shadow: 6px 6px 0px #ff0000;
            color: #ff0000;
        }

        /* ร่างแยกปุ่ม No */
        .decoy {
            position: fixed;
            z-index: 50;
            pointer-events: auto;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }

        .shaking { animation: shake 0.5s infinite; }
    </style>
</head>
<body>

    <div class="game-container" id="gameBox">
        <div id="battle-ui">
            <div class="flex justify-between mb-2">
                <span class="retro-font text-[10px]">BOSS: ความโกรธของเธอ</span>
                <span class="retro-font text-[10px]" id="hp-text">HP: 100/100</span>
            </div>
            <div class="hp-bar-bg">
                <div id="hp-fill"></div>
            </div>

            <div class="py-10 text-center">
                <div id="boss-sprite" class="text-6xl mb-4">💢</div>
                <p class="text-lg">แมนใช้สกิล "ง้อขั้นสุด"!</p>
                <p class="text-gray-400 text-xs mt-2">เธอจะยอมรับคำขอโทษไหม?</p>
            </div>

            <div class="grid grid-cols-1 gap-6">
                <button onclick="attackBoss()" class="btn-retro btn-yes retro-font text-xs">
                    ยอมให้อภัย (ATTACK!)
                </button>
                <div class="h-12 relative">
                    <button id="noBtn" onmouseover="glitchRun()" class="btn-retro btn-no retro-font text-xs absolute left-0 right-0 mx-auto w-full">
                        ไม่! งอนต่อ
                    </button>
                </div>
            </div>
        </div>

        <div id="victory-ui" class="hidden text-center py-10">
            <div class="text-7xl mb-6">💖</div>
            <h1 class="retro-font text-xl text-green-400 mb-4">VICTORY!</h1>
            <p>ความโกรธถูกทำลายสิ้นซาก!</p>
            <p class="text-pink-400 mt-4">แมนหลอกหมาได้อีกแล้วโว๊ยย</p>
            <button onclick="location.reload()" class="mt-8 text-[10px] retro-font text-gray-500 underline">PLAY AGAIN?</button>
        </div>
    </div>

    <script>
        let hp = 100;
        const hpFill = document.getElementById('hp-fill');
        const hpText = document.getElementById('hp-text');
        const bossSprite = document.getElementById('boss-sprite');
        const gameBox = document.getElementById('gameBox');

        function attackBoss() {
            hp -= 25;
            if (hp < 0) hp = 0;
            
            hpFill.style.width = hp + '%';
            hpText.innerText = `HP: ${hp}/100`;
            
            // เอฟเฟกต์สั่นเวลาโดนโจมตี
            gameBox.classList.add('shaking');
            setTimeout(() => gameBox.classList.remove('shaking'), 200);

            if (hp <= 50) bossSprite.innerText = '🥺';
            if (hp <= 0) victory();
        }

        function victory() {
            document.getElementById('battle-ui').classList.add('hidden');
            document.getElementById('victory-ui').classList.remove('hidden');
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#00ff00', '#ff4d6d', '#ffffff']
            });
        }

        function glitchRun() {
            const btn = document.getElementById('noBtn');
            
            // ย้ายตำแหน่งปุ่มจริง
            const x = (Math.random() - 0.5) * 300;
            const y = (Math.random() - 0.5) * 300;
            btn.style.transform = `translate(${x}px, ${y}px)`;

            // สร้างร่างแยก (Decoy)
            createDecoy();
        }

        function createDecoy() {
            const decoy = document.createElement('button');
            decoy.innerText = 'ไม่!';
            decoy.className = 'btn-retro btn-no retro-font text-[8px] decoy';
            decoy.style.left = Math.random() * 80 + 10 + 'vw';
            decoy.style.top = Math.random() * 80 + 10 + 'vh';
            
            document.body.appendChild(decoy);

            // ร่างแยกจะหายไปเองใน 1 วินาที
            setTimeout(() => decoy.remove(), 1000);

            // ถ้าเผลอกดโดนร่างแยก
            decoy.onclick = () => {
                alert("กดผิด! นี่มันร่างแยก 😜");
                decoy.remove();
            };
        }
    </script>
</body>
</html>
